<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaveMyPass.dev — Your Digital Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'sans-serif'],
            outfit: ['Outfit', 'sans-serif'],
          },
          colors: {
            'brand-orange': '#F97316',
            'brand-orange-hover': '#EA580C',
            'brand-orange-light': '#FFF7ED',
            'brand-orange-glow': 'rgba(249, 115, 22, 0.15)',
            'brand-slate': {
              50: '#F8FAFC',
              100: '#F1F5F9',
              200: '#E2E8F0',
              300: '#CBD5E1',
              400: '#94A3B8',
              500: '#64748B',
              600: '#475569',
              700: '#334155',
              800: '#1E293B',
              900: '#0F172A',
              950: '#030712',
            }
          }
        }
      }
    }
  </script>
  <!-- Start Single Page Apps for GitHub Pages -->
  <script type="text/javascript">
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, l.pathname.length - l.search.length) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <!-- End Single Page Apps for GitHub Pages -->
  <style>
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #f8fafc;
    }

    .form-shadow {
      box-shadow: 0 10px 30px -12px rgba(0, 0, 0, .08);
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="bg-[#f8fafc] text-slate-900 antialiased selection:bg-orange-100 selection:text-orange-900">
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
