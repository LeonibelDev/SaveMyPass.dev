<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault - SaveMyPass.dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .sidebar-item:hover {
            background-color: #f3f4f6;
        }

        .active-nav {
            background-color: #fff7ed;
            color: #f97316;
            border-right: 3px solid #f97316;
        }
    </style>
</head>

<body class="bg-[#fcfcfc] text-slate-800 antialiased">

    <div class="flex min-h-screen">
        <aside class="w-64 border-r border-slate-100 bg-white flex flex-col sticky top-0 h-screen">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-orange-500 p-2 rounded-xl shadow-lg shadow-orange-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                    </svg>
                </div>
                <span class="font-bold text-lg tracking-tight">SaveMyPass</span>
            </div>

            <nav class="flex-1 px-3 space-y-1 mt-4">
                <a href="/home"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg active-nav font-medium transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2m-4-1v8m0 0l3-3m-3 3L9 8m-5 5h2.586a1 1 0 01.707.293l2.414 2.414a1 1 0 00.707.293h3.172a1 1 0 00.707-.293l2.414-2.414a1 1 0 01.707-.293H20" />
                    </svg>
                    Vault
                </a>
                <a href="/profile"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-slate-500 font-medium transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Profile Settings
                </a>
                <a href="/export"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-slate-500 font-medium transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Export to PDF
                </a>
            </nav>

            <div class="p-4 border-t border-slate-50">
                <div class="bg-slate-50 rounded-xl p-4">
                    <p class="text-xs font-semibold text-slate-400 uppercase mb-1">User Account</p>
                    <p class="text-sm font-bold truncate" th:text="${user.email}">user@mail.com</p>
                    <a href="/logout" class="text-xs text-rose-500 font-bold mt-2 inline-block hover:underline">Log
                        Out</a>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-10 max-w-5xl">
            <header class="flex justify-between items-center mb-12">
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Your Credentials</h1>
                    <p class="text-slate-500 mt-1">Manage and protect your access keys.</p>
                </div>
                <button onclick="toggleModal('add-modal', true)"
                    class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 px-6 rounded-full transition-all shadow-md shadow-orange-200 active:scale-95">
                    + New Entry
                </button>
            </header>

            <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div th:each="password : ${passwords}"
                    class="group relative bg-white border border-slate-100 rounded-2xl p-6 shadow-sm hover:shadow-xl hover:border-orange-200 transition-all duration-300">

                    <span class="absolute top-4 right-6 text-[10px] font-mono text-slate-300 select-none"
                        th:text="'ID: ' + ${password.id}">ID: 001</span>

                    <div class="flex items-start justify-between mb-6">
                        <div class="flex items-center gap-4">
                            <div class="relative">
                                <div th:with="siteLower=${#strings.toLowerCase(password.site)}"
                                    class="w-12 h-12 rounded-xl flex items-center justify-center border border-slate-100 transition-colors duration-500"
                                    th:classappend="${
                                        #strings.contains(siteLower, 'facebook') ? 'bg-blue-50 border-blue-100' : 
                                        #strings.contains(siteLower, 'google') ? 'bg-rose-50 border-rose-100' :
                                        #strings.contains(siteLower, 'twitter') || #strings.contains(siteLower, ' x.') ? 'bg-slate-900 border-slate-800' :
                                        #strings.contains(siteLower, 'github') ? 'bg-slate-100 border-slate-200' :
                                        #strings.contains(siteLower, 'linkedin') ? 'bg-blue-100 border-blue-200' :
                                        #strings.contains(siteLower, 'instagram') ? 'bg-pink-50 border-pink-100' :
                                        #strings.contains(siteLower, 'tiktok') ? 'bg-black border-slate-800' :
                                        'bg-slate-50 border-slate-100'}">

                                    <!-- Facebook -->
                                    <svg th:if="${#strings.contains(siteLower, 'facebook')}"
                                        class="h-6 w-6 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                                        <path
                                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                                    </svg>

                                    <!-- Google -->
                                    <svg th:if="${#strings.contains(siteLower, 'google')}" class="h-6 w-6"
                                        viewBox="0 0 24 24">
                                        <path
                                            d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C20.187 1.44 17.4 0 12.227 0 5.4 0 .027 5.387.027 12s5.373 12 12.2 12c3.587 0 6.293-1.187 8.333-3.32 2.093-2.093 2.76-4.96 2.76-7.307 0-.707-.053-1.373-.16-2.013h-10.7z"
                                            fill="#EA4335" />
                                    </svg>

                                    <!-- Twitter / X -->
                                    <svg th:if="${#strings.contains(siteLower, 'twitter') || #strings.contains(siteLower, ' x.')}"
                                        class="h-5 w-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                                        <path
                                            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                                    </svg>

                                    <!-- GitHub -->
                                    <svg th:if="${#strings.contains(siteLower, 'github')}"
                                        class="h-6 w-6 text-slate-900" fill="currentColor" viewBox="0 0 24 24">
                                        <path fill-rule="evenodd"
                                            d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
                                            clip-rule="evenodd" />
                                    </svg>

                                    <!-- LinkedIn -->
                                    <svg th:if="${#strings.contains(siteLower, 'linkedin')}"
                                        class="h-6 w-6 text-blue-700" fill="currentColor" viewBox="0 0 24 24">
                                        <path
                                            d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                                    </svg>

                                    <!-- Instagram -->
                                    <svg th:if="${#strings.contains(siteLower, 'instagram')}"
                                        class="h-6 w-6 text-pink-600" fill="currentColor" viewBox="0 0 24 24">
                                        <path
                                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.668-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
                                    </svg>

                                    <!-- Fallback Browser Logo -->
                                    <svg th:if="${!#strings.contains(siteLower, 'facebook') && !#strings.contains(siteLower, 'google') && !#strings.contains(siteLower, 'twitter') && !#strings.contains(siteLower, ' x.') && !#strings.contains(siteLower, 'github') && !#strings.contains(siteLower, 'linkedin') && !#strings.contains(siteLower, 'instagram') && !#strings.contains(siteLower, 'tiktok')}"
                                        class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
                                    </svg>
                                </div>
                                <div
                                    class="absolute -bottom-1 -right-1 bg-orange-100 rounded-full p-1 border-2 border-white">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-orange-600"
                                        viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd"
                                            d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                            clip-rule="evenodd" />
                                    </svg>
                                </div>
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-900 capitalize" th:text="${password.site}">Website</h3>
                                <p class="text-slate-400 text-xs font-medium" th:text="${password.username}">username
                                </p>
                            </div>
                        </div>

                        <div class="flex gap-1 mt-2">
                            <button th:data-id="${password.id}" th:data-site="${password.site}"
                                th:data-username="${password.username}" onclick="openUpdateModal(this)"
                                class="p-2 hover:bg-slate-50 rounded-lg text-slate-400 hover:text-orange-500 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                </svg>
                            </button>
                            <form th:action="@{/delete/{id}(id=${password.id})}" method="post"
                                onsubmit="return confirm('Delete record?')">
                                <button type="submit"
                                    class="p-2 hover:bg-rose-50 rounded-lg text-slate-400 hover:text-rose-500 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </div>

                    <div
                        class="bg-slate-50 rounded-xl p-3 flex items-center justify-between border border-slate-100 group-hover:bg-white transition-colors">
                        <input type="password" th:value="${password.password}" readonly
                            class="bg-transparent border-none text-sm font-mono tracking-widest w-full focus:ring-0 text-slate-600">
                        <button onclick="togglePassword(this)"
                            class="text-[10px] font-bold uppercase tracking-tighter text-orange-500 hover:text-orange-600 px-2">Show</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-container" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md" onclick="closeAllModals()"></div>

        <div id="add-modal"
            class="hidden relative w-full max-w-md bg-white rounded-3xl p-10 shadow-2xl border border-slate-100">
            <h2 class="text-2xl font-extrabold text-slate-900 mb-1">New Credential</h2>
            <p class="text-slate-400 text-sm mb-8 font-medium">Add a new account to your secure vault.</p>
            <form th:action="@{/add}" method="post" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Platform
                        Name</label>
                    <input type="text" name="site" required placeholder="example.com"
                        class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 focus:outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Username /
                        Email</label>
                    <input type="text" name="username" required placeholder="john@doe.com"
                        class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 focus:outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Secret
                        Password</label>
                    <input type="password" name="password" required placeholder="••••••••"
                        class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 focus:outline-none transition-all">
                </div>
                <button type="submit"
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-orange-200 mt-4">Securely
                    Save</button>
            </form>
        </div>

        <div id="update-modal"
            class="hidden relative w-full max-w-md bg-white rounded-3xl p-10 shadow-2xl border border-slate-100">
            <h2 class="text-2xl font-extrabold text-slate-900 mb-1">Edit Entry</h2>
            <p class="text-slate-400 text-sm mb-8 font-medium">Update the details for this credential.</p>
            <form id="update-form" method="post" class="space-y-5">
                <input type="text" id="update-site" name="site" required
                    class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 mb-4">
                <input type="text" id="update-username" name="username" required
                    class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 mb-4">
                <input type="password" name="newpassword" placeholder="New password (optional)"
                    class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:border-orange-500 mb-4">
                <button type="submit"
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-orange-200">Update
                    Record</button>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(modalId, show) {
            const container = document.getElementById('modal-container');
            const modal = document.getElementById(modalId);
            if (show) {
                container.classList.remove('hidden');
                modal.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
                modal.classList.add('hidden');
            }
        }

        function closeAllModals() {
            toggleModal('add-modal', false);
            toggleModal('update-modal', false);
        }

        function openUpdateModal(btn) {
            const form = document.getElementById('update-form');
            form.action = '/update/' + btn.dataset.id;
            document.getElementById('update-site').value = btn.dataset.site;
            document.getElementById('update-username').value = btn.dataset.username;
            toggleModal('update-modal', true);
        }

        function togglePassword(btn) {
            const input = btn.previousElementSibling;
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.textContent = isPassword ? 'Hide' : 'Show';
        }
    </script>
</body>

</html>
