<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Dac Administrador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: "Open Sans", sans-serif;
            background-color: #f8fafc;
        }

        .sidebar-item:hover {
            background-color: rgba(239, 68, 68, 0.05);
            color: #ef4444;
        }

        .platform-card {
            transition: all 0.3s ease;
        }

        .platform-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
            border-color: #fca5a5;
        }

        #modalNuevoAcceso,
        #modalEditarAcceso {
            display: none;
            backdrop-filter: blur(5px);
        }

        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body class="h-screen flex bg-gray-50 overflow-hidden">

    <div id="mobileOverlay" class="fixed inset-0 bg-black/50 z-30 hidden transition-opacity" onclick="toggleSidebar()">
    </div>

    <aside id="sidebar"
        class="fixed inset-y-0 left-0 z-40 w-64 bg-white border-r border-gray-200 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 flex flex-col h-full">
        <div class="p-6 border-b border-gray-100 flex items-center justify-between">
            <img src="https://1000logos.net/wp-content/uploads/2021/05/Claro-logo.png" class="w-24" alt="Claro" />
            <button class="md:hidden text-gray-500 hover:text-red-600" onclick="toggleSidebar()">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
        </div>

        <nav class="flex-grow p-4 space-y-2 overflow-y-auto">
            <a href="#"
                class="sidebar-item flex items-center space-x-3 p-3 rounded-xl bg-red-50 text-red-600 font-bold transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                    </path>
                </svg>
                <span>Mis Accesos</span>
            </a>
            <a href="/logout" class="sidebar-item flex items-center space-x-3 p-3 rounded-xl text-gray-500 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7">
                    </path>
                </svg>
                <span>Cerrar sesión</span>
            </a>
        </nav>

        <div class="p-4 border-t border-gray-100">
            <div
                class="flex items-center space-x-3 p-3 bg-gray-50 hover:bg-gray-100 cursor-pointer rounded-xl transition">
                <div
                    class="w-10 h-10 bg-gradient-to-tr from-red-600 to-red-400 rounded-full flex items-center justify-center text-white font-bold shadow-md">
                    <span th:text="${user.name.split(' ')[0].charAt(0)}"></span>
                </div>
                <div class="overflow-hidden flex-1">
                    <p class="text-sm font-bold text-gray-800 truncate" th:text="${user.name}"></p>
                    <p class="text-[11px] text-gray-500 font-mono" th:text="'ID: ' + ${user.card}"></p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">

        <header
            class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-8 gap-4 flex-shrink-0">
            <button onclick="toggleSidebar()"
                class="md:hidden text-gray-500 hover:text-red-600 focus:outline-none transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
            </button>

            <div class="relative flex-1 max-w-lg">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </span>
                <input type="text" placeholder="Buscar plataforma o servicio..."
                    class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-full bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:bg-white transition-all shadow-sm" />
            </div>

            <button onclick="toggleModal(true)"
                class="bg-red-600 hover:bg-red-700 text-white px-4 sm:px-5 py-2 rounded-full text-sm font-bold transition-all shadow-md shadow-red-200 flex items-center space-x-2 whitespace-nowrap">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path>
                </svg>
                <span class="hidden sm:inline">Nuevo Acceso</span>
            </button>
        </header>

        <div class="p-4 sm:p-8 overflow-y-auto flex-1">
            <div class="mb-6 sm:mb-8">
                <h2 class="text-xl sm:text-2xl font-bold text-gray-800">Mis Credenciales Guardadas</h2>
                <p class="text-gray-500 text-sm mt-1">Gestiona tus accesos de forma segura bajo la política de seguridad
                    Claro.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6 pb-8">

                <div class="platform-card bg-white p-5 sm:p-6 rounded-2xl border border-gray-100 shadow-sm"
                    th:each="password : ${passwords}">
                    <div class="flex items-center justify-between mb-5">
                        <div
                            class="w-12 h-12 bg-gray-50 rounded-xl border border-gray-100 flex items-center justify-center">
                            <img src="https://www.google.com/s2/favicons?sz=64&domain=microsoft.com" class="w-7 h-7"
                                alt="Icono" />
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span
                                class="text-[10px] font-bold px-2.5 py-1 bg-green-100 text-green-700 rounded-full uppercase tracking-wider hidden sm:inline-block">Segura</span>

                            <button type="button" th:data-id="${password.id}" th:data-username="${password.username}"
                                th:data-site="${password.site}" th:data-password="${password.password}"
                                onclick="openEditModal(this)"
                                class="text-gray-400 hover:text-blue-600 p-1.5 rounded-lg hover:bg-blue-50 transition"
                                title="Editar">
                                <svg class="w-4 h-4 sm:w-4.5 sm:h-4.5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </button>

                            <form th:action="@{/delete/{id}(id=${password.id})}" method="post" class="inline">
                                <button type="submit"
                                    class="text-gray-400 hover:text-red-600 p-1.5 rounded-lg hover:bg-red-50 transition"
                                    onclick="return confirm('¿Eliminar esta credencial?')" title="Eliminar">
                                    <svg class="w-4 h-4 sm:w-4.5 sm:h-4.5" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </div>

                    <h3 class="font-bold text-gray-800 text-lg mb-1" th:text="${password.site}">Microsoft Portal</h3>
                    <p class="text-sm text-gray-500 mb-5 truncate" th:text="${password.username}">
                        carlos.mendez@claro.com</p>

                    <div class="flex items-center justify-between p-2.5 bg-gray-50 border border-gray-200 rounded-xl">
                        <div class="flex-1 overflow-hidden px-2">
                            <span class="password-text text-sm font-mono text-gray-600 tracking-widest"
                                th:data-pass="${password.password}">••••••••</span>
                        </div>

                        <div class="flex items-center border-l border-gray-200 pl-2 ml-2 space-x-1">
                            <button type="button" onclick="toggleCardPassword(this)"
                                class="text-gray-400 hover:text-gray-700 p-1.5 rounded-md hover:bg-gray-200 transition"
                                title="Mostrar/Ocultar">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                            <button type="button" onclick="copyCardPassword(this)"
                                class="copy-btn text-red-500 hover:text-red-700 p-1.5 rounded-md hover:bg-red-50 transition flex items-center justify-center w-8 h-8"
                                title="Copiar contraseña">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="modalNuevoAcceso"
            class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4 opacity-0 pointer-events-none transition-opacity duration-300">
            <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border border-gray-100 transform scale-95 transition-transform duration-300"
                id="modalNuevoContent">
                <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-lg text-gray-800">Agregar Nuevo Acceso</h3>
                    <button onclick="toggleModal(false)"
                        class="text-gray-400 hover:text-gray-600 bg-white p-1 rounded-full shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <form class="p-6 space-y-5" method="post" th:action="@{/add}">
                    <div>
                        <label
                            class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">Plataforma</label>
                        <input type="text" name="site" placeholder="Ej. AWS, SAP, Oracle..." required
                            class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition bg-gray-50 focus:bg-white" />
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">Usuario /
                            Email</label>
                        <input type="text" name="username" placeholder="usuario@claro.com.do" required
                            class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition bg-gray-50 focus:bg-white" />
                    </div>
                    <div>
                        <label
                            class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">Contraseña</label>
                        <input type="password" name="password" placeholder="••••••••" required
                            class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition bg-gray-50 focus:bg-white" />
                    </div>
                    <div class="pt-2">
                        <button type="submit"
                            class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition-all shadow-lg shadow-red-200 transform hover:-translate-y-0.5">
                            Guardar Credencial
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div id="modalEditarAcceso"
            class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4 opacity-0 pointer-events-none transition-opacity duration-300">
            <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border border-gray-100 transform scale-95 transition-transform duration-300"
                id="modalEditarContent">
                <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-lg text-gray-800">Editar Acceso</h3>
                    <button type="button" onclick="toggleEditModal(false)"
                        class="text-gray-400 hover:text-gray-600 bg-white p-1 rounded-full shadow-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <form class="p-6 space-y-5" method="post" id="editForm">
                    <div>
                        <label
                            class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">Plataforma</label>
                        <input type="text" name="site" id="editSite" required
                            class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition bg-gray-50 focus:bg-white" />
                    </div>
                    <div>
                        <label
                            class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">Usuario</label>
                        <input type="text" name="username" id="editUsername" required
                            class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition bg-gray-50 focus:bg-white" />
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">Nueva
                            Contraseña</label>
                        <div class="relative">
                            <input type="password" name="newpassword" id="editPassword" required
                                class="w-full px-4 py-2.5 border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition bg-gray-50 focus:bg-white pr-10" />
                            <button type="button" onclick="toggleEditPasswordVisibility()"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                                <svg id="eyeIconEdit" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="pt-2">
                        <button type="submit"
                            class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition-all shadow-lg shadow-red-200 transform hover:-translate-y-0.5">
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <script>
        // ── Responsive Sidebar Toggle ──
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');

            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // ── Card Password Visibility Toggle ──
        function toggleCardPassword(btn) {
            const container = btn.closest('.bg-gray-50'); // the wrapper div
            const passSpan = container.querySelector('.password-text');
            const eyeIcon = btn.querySelector('svg');
            const actualPass = passSpan.getAttribute('data-pass'); // Fetches actual pass rendered by Thymeleaf

            if (passSpan.textContent === '••••••••') {
                passSpan.textContent = actualPass;
                passSpan.classList.remove('tracking-widest');
                // Switch to eye-off icon
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/>`;
            } else {
                passSpan.textContent = '••••••••';
                passSpan.classList.add('tracking-widest');
                // Switch back to normal eye
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            }
        }

        // ── Smart Copy Password ──
        function copyCardPassword(btn) {
            const container = btn.closest('.bg-gray-50');
            const passSpan = container.querySelector('.password-text');
            const actualPass = passSpan.getAttribute('data-pass'); // Grabs real password even if obscured

            navigator.clipboard.writeText(actualPass).then(() => {
                const originalIcon = btn.innerHTML;
                btn.innerHTML = '<span class="text-[10px] font-bold">¡Copiado!</span>';
                btn.classList.add("bg-green-100", "text-green-700");
                btn.classList.remove("text-red-500", "hover:text-red-700", "hover:bg-red-50");

                setTimeout(() => {
                    btn.innerHTML = originalIcon;
                    btn.classList.remove("bg-green-100", "text-green-700");
                    btn.classList.add("text-red-500", "hover:text-red-700", "hover:bg-red-50");
                }, 2000);
            });
        }


        // ── Control de Modal Nuevo Acceso ──
        function toggleModal(show) {
            const modal = document.getElementById("modalNuevoAcceso");
            const content = document.getElementById("modalNuevoContent");
            if (show) {
                modal.classList.remove("opacity-0", "pointer-events-none");
                modal.style.display = "flex"; // Forzamos el flex para que se vea
                setTimeout(() => content.classList.add("scale-100"), 10);
            } else {
                content.classList.remove("scale-100");
                modal.classList.add("opacity-0", "pointer-events-none");
                setTimeout(() => modal.style.display = "none", 300);
            }
        }

        // ── Control de Modal Editar Acceso ──
        function openEditModal(btn) {
            // 1. Extraer datos del botón (Thymeleaf)
            const id = btn.getAttribute('data-id');
            const site = btn.getAttribute('data-site');
            const username = btn.getAttribute('data-username');
            const password = btn.getAttribute('data-password');

            // 2. Rellenar los campos del formulario
            document.getElementById("editSite").value = site;
            document.getElementById("editUsername").value = username;
            document.getElementById("editPassword").value = password;
            document.getElementById("editForm").action = "/update/" + id;

            // 3. Mostrar el modal
            toggleEditModal(true);
        }

        function toggleEditModal(show) {
            const modal = document.getElementById("modalEditarAcceso");
            const content = document.getElementById("modalEditarContent");
            if (show) {
                modal.classList.remove("opacity-0", "pointer-events-none");
                modal.style.display = "flex";
                setTimeout(() => content.classList.add("scale-100"), 10);
            } else {
                content.classList.remove("scale-100");
                modal.classList.add("opacity-0", "pointer-events-none");
                setTimeout(() => modal.style.display = "none", 300);
            }
        }

        function toggleEditPasswordVisibility() {
            const input = document.getElementById("editPassword");
            const icon = document.getElementById("eyeIconEdit");
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"/>`;
            } else {
                input.type = "password";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            }
        }

        // ── Close Modals When Clicking Outside ──
        window.onclick = function (event) {
            const modalNuevo = document.getElementById("modalNuevoAcceso");
            const modalEditar = document.getElementById("modalEditarAcceso");
            if (event.target === modalNuevo) toggleModal(false);
            if (event.target === modalEditar) toggleEditModal(false);
        };
    </script>
</body>

</html>
