<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SaveMyPass.dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .form-shadow {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="bg-[#fcfcfc] text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 group">
                <div
                    class="bg-orange-500 p-1.5 rounded-lg shadow-lg shadow-orange-200 group-hover:scale-105 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                    </svg>
                </div>
                <span class="font-bold text-lg tracking-tight">SaveMyPass<span
                        class="text-orange-500">.dev</span></span>
            </a>
            <a href="/login" class="text-sm font-semibold text-slate-500 hover:text-orange-500 transition-colors">Log
                In</a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6 py-12">
        <div class="w-full max-w-[480px]">
            <div class="bg-white border border-slate-100 rounded-[2.5rem] p-10 md:p-12 form-shadow">
                <div class="text-center mb-10">
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Create account</h1>
                    <p class="text-slate-400 font-medium text-sm">Security simplified. Start your vault today.</p>
                </div>

                <div th:if="${error}"
                    class="mb-6 p-4 bg-rose-50 border border-rose-100 rounded-2xl text-rose-600 text-sm font-medium text-center"
                    th:text="${error}"></div>

                <form th:action="@{/signup}" method="post" th:object="${signupForm}" class="space-y-5">

                    <div class="space-y-2">
                        <label for="nombreCompleto"
                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Full
                            Name</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-300">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </span>
                            <input type="text" id="nombreCompleto" name="nombreCompleto" required placeholder="John Doe"
                                class="w-full bg-slate-50 border border-slate-100 rounded-2xl pl-12 pr-4 py-3.5 focus:bg-white focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 focus:outline-none transition-all placeholder:text-slate-300 text-sm">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="email"
                            class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Email
                            Address</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-300">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                                </svg>
                            </span>
                            <input type="email" id="email" name="email" required placeholder="name@example.com"
                                class="w-full bg-slate-50 border border-slate-100 rounded-2xl pl-12 pr-4 py-3.5 focus:bg-white focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 focus:outline-none transition-all placeholder:text-slate-300 text-sm">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label for="password"
                                class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Password</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                    </svg>
                                </span>
                                <input type="password" id="password" name="password" required placeholder="••••••••"
                                    class="w-full bg-slate-50 border border-slate-100 rounded-2xl pl-12 pr-4 py-3.5 focus:bg-white focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 focus:outline-none transition-all placeholder:text-slate-300 text-sm">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label for="passwordConfirmacion"
                                class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Confirm</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-300">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                    </svg>
                                </span>
                                <input type="password" id="passwordConfirmacion" name="passwordConfirmacion" required
                                    placeholder="••••••••"
                                    class="w-full bg-slate-50 border border-slate-100 rounded-2xl pl-12 pr-4 py-3.5 focus:bg-white focus:ring-4 focus:ring-orange-500/10 focus:border-orange-500 focus:outline-none transition-all placeholder:text-slate-300 text-sm">
                            </div>
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-orange-200 active:scale-[0.98] mt-4">
                        Create Account
                    </button>
                </form>

                <div class="mt-10 text-center">
                    <p class="text-sm text-slate-400 font-medium">
                        Already have an account?
                        <a href="/login"
                            class="text-orange-500 hover:text-orange-600 font-bold ml-1 transition-colors">Log in</a>
                    </p>
                </div>
            </div>

            <p class="text-center mt-8 text-[10px] text-slate-300 font-bold tracking-[0.2em] uppercase">
                Privacy first • Encryption by default
            </p>
        </div>
    </main>

</body>

</html>
