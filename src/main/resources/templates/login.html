<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Dac Administrador de Contraseñas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --red: #dc2626;
            --red-hover: #b91c1c;
            --red-glow: rgba(220, 38, 38, 0.12);
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }

        body {
            font-family: "Open Sans", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: url("https://www.claro.com.br/files/104379/1200x800/ce9ac146c8/opengraph-pag-claro-combo-multi.png") no-repeat center center fixed;
            background-size: cover;
            background-color: #f4f4f4;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(1.5rem, 5vw, 4rem) 1rem;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.92) 0%, rgba(240, 240, 240, 0.7) 100%);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        /* ── PANEL IZQUIERDO ── */
        .panel-left {
            background: #fff;
            border-right: 1px solid var(--gray-100);
            padding: clamp(2rem, 5vw, 3rem) clamp(1.5rem, 4vw, 2.5rem);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.75rem;
        }

        .panel-left img {
            width: clamp(110px, 14vw, 176px);
        }

        .panel-left-text {
            text-align: center;
        }

        .panel-left-text h1 {
            font-size: clamp(1.05rem, 2vw, 1.3rem);
            font-weight: 600;
            color: var(--gray-800);
            line-height: 1.35;
        }

        .panel-left-text h1 span {
            color: var(--red);
            font-weight: 700;
        }

        .divider {
            width: 3rem;
            height: 3px;
            background: var(--red);
            border-radius: 2px;
            margin: 1rem auto;
        }

        .panel-left-text p {
            font-size: 0.78rem;
            color: var(--gray-500);
            line-height: 1.7;
            max-width: 22ch;
            margin: 0 auto;
        }

        .shield-wrap {
            width: 56px;
            height: 56px;
            background: var(--gray-50);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .shield-wrap svg {
            width: 26px;
            height: 26px;
            color: var(--gray-400);
        }

        /* ── PANEL DERECHO ── */
        .panel-right {
            padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 4vw, 2.75rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2rem;
        }

        .form-header h2 {
            font-size: clamp(1.4rem, 2.5vw, 1.8rem);
            font-weight: 700;
            color: var(--gray-900);
        }

        .form-header p {
            font-size: 0.85rem;
            color: var(--gray-500);
            margin-top: 0.3rem;
        }

        /* ── FIELDS ── */
        .fields {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .field-label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--gray-700);
        }

        .forgot {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--red);
            text-decoration: none;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        .input-wrap {
            position: relative;
        }

        input {
            width: 100%;
            padding: 0.72rem 0.9rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--gray-800);
            background: var(--gray-50);
            transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
        }

        input::placeholder {
            color: var(--gray-400);
        }

        input:focus {
            outline: none;
            border-color: var(--red);
            background: #fff;
            box-shadow: 0 0 0 3px var(--red-glow);
        }

        .has-toggle input {
            padding-right: 2.5rem;
        }

        .toggle-pw {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray-400);
            display: flex;
            align-items: center;
            padding: 2px;
            transition: color 0.18s;
        }

        .toggle-pw:hover {
            color: var(--gray-600);
        }

        .toggle-pw svg {
            width: 17px;
            height: 17px;
        }

        /* ── BOTÓN ── */
        .btn {
            width: 100%;
            padding: 0.82rem;
            background: var(--red);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.18s, box-shadow 0.18s, transform 0.12s;
            box-shadow: 0 4px 14px rgba(220, 38, 38, 0.25);
        }

        .btn:hover {
            background: var(--red-hover);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.35);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* ── LINKS / ERROR ── */
        .register-link {
            font-size: 0.82rem;
            color: var(--gray-600);
            text-align: center;
        }

        .register-link a {
            color: var(--red);
            font-weight: 700;
            text-decoration: none;
            margin-left: 3px;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .error-box {
            background: #fef2f2;
            border-left: 4px solid #f87171;
            border-radius: 0 8px 8px 0;
            padding: 0.75rem 1rem;
            font-size: 0.78rem;
            color: #991b1b;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            z-index: 50;
            background: #22c55e;
            color: #fff;
            padding: 0.75rem 1.25rem;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            animation: slideIn 0.3s ease both;
        }

        .toast.hide {
            animation: slideOut 0.3s ease both;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(1.5rem);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(1.5rem);
            }
        }

        .toast-close {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            line-height: 1;
            padding: 0;
        }

        /* ── PAGE FOOTER ── */
        footer {
            background: var(--gray-50);
            border-top: 1px solid var(--gray-200);
            padding: 1.1rem 1rem;
        }

        .footer-inner {
            max-width: 760px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.72rem;
            color: var(--gray-500);
        }

        .footer-inner a {
            color: var(--gray-500);
            text-decoration: none;
            transition: color 0.18s;
        }

        .footer-inner a:hover {
            color: var(--red);
        }

        .footer-links {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .footer-sep {
            color: var(--gray-300);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .card {
                grid-template-columns: 1fr;
                border-radius: 16px;
                max-width: 420px;
            }

            .panel-left {
                border-right: none;
                border-bottom: 1px solid var(--gray-100);
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                padding: 1.5rem 1.5rem 1.25rem;
                gap: 1rem;
            }

            .panel-left img {
                width: 90px;
            }

            .panel-left-text p,
            .shield-wrap {
                display: none;
            }

            .divider {
                margin: 0.5rem auto;
            }

            .panel-right {
                padding: 1.5rem;
                gap: 1.4rem;
            }
        }

        @media (max-width: 380px) {
            .panel-left {
                padding: 1.1rem 1rem;
            }

            .panel-right {
                padding: 1.25rem 1rem;
            }
        }
    </style>
</head>

<body>
    <main>
        <div class="card">

            <!-- IZQUIERDA -->
            <aside class="panel-left">
                <img src="https://1000logos.net/wp-content/uploads/2021/05/Claro-logo.png" alt="Claro" />
                <div class="panel-left-text">
                    <h1>Gestión de <span>Credenciales</span></h1>
                    <div class="divider"></div>
                    <p>Acceso seguro al sistema DAC para colaboradores internos.</p>
                </div>
                <div class="shield-wrap">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
            </aside>

            <!-- DERECHA -->
            <section class="panel-right">
                <div class="form-header">
                    <h2>Iniciar sesión</h2>
                    <p>Bienvenido de nuevo, ingrese sus datos.</p>
                </div>

                <form method="POST" action="/login">
                    <div class="fields">
                        <div class="field">
                            <label for="tarjetaEmpleado">Tarjeta de empleado</label>
                            <input id="tarjetaEmpleado" type="text" name="tarjetaEmpleado" placeholder="ID de empleado"
                                autocomplete="off" required />
                        </div>

                        <div class="field">
                            <div class="field-label-row">
                                <label for="password">Contraseña</label>
                                <a href="#" class="forgot">¿Olvidó su clave?</a>
                            </div>
                            <div class="input-wrap has-toggle">
                                <input id="password" type="password" name="password" placeholder="••••••••"
                                    autocomplete="off" required />
                                <button type="button" class="toggle-pw" onclick="togglePw('password')"
                                    aria-label="Mostrar contraseña">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="error-box" th:if="${error}" style="margin-top:1.1rem;">
                        <strong>Error:</strong> <span th:text="${error}"></span>
                    </div>

                    <button type="submit" class="btn" style="margin-top:1.5rem;">Entrar al sistema</button>
                </form>

                <p class="register-link">
                    ¿No tienes cuenta aún?
                    <a href="/signup">Regístrate aquí</a>
                </p>
            </section>

        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <p>© 2026 Claro Dominicana. Área de Ciberseguridad.</p>
            <div class="footer-links">
                <a href="#">Términos de uso</a>
                <span class="footer-sep">•</span>
                <a href="#">Políticas de Privacidad</a>
            </div>
        </div>
    </footer>

    <!-- Toast de éxito (Thymeleaf) -->
    <div class="toast" id="toast" th:if="${message}" style="display:none;">
        <span th:text="${message}"></span>
        <button class="toast-close" onclick="closeToast()">✕</button>
    </div>

    <script>
        function togglePw(id) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        // Toast auto-dismiss
        const toast = document.getElementById('toast');
        if (toast) {
            toast.style.display = 'flex';
            const timer = setTimeout(() => closeToast(), 3000);
            function closeToast() {
                clearTimeout(timer);
                toast.classList.add('hide');
                toast.addEventListener('animationend', () => toast.remove(), { once: true });
            }
            window.closeToast = closeToast;
        }
    </script>
</body>

</html>
