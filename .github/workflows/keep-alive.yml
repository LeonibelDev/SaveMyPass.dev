name: Keep Koyeb Alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping API health endpoint
        run: |
          echo "Pinging Koyeb backend..."
          RESPONSE=$(curl -L --fail --silent --show-error -m 30 --retry 3 --retry-delay 5 \
            -w "\nHTTP Status: %{http_code}" \
            https://exceptional-cordie-leonibel-251434e5.koyeb.app/api/service/health)
          echo "$RESPONSE"
          echo "Ping successful ✓"